<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Öine Maantee</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        overflow:hidden;
        background:#000;
        font-family:Arial, sans-serif;
    }

    canvas{
        display:block;
    }

    .title{
        position:absolute;
        top:20px;
        left:20px;
        color:white;
        z-index:10;
        text-shadow:0 0 12px rgba(255,255,255,0.8);
    }

    .title h1{
        font-size:34px;
        letter-spacing:3px;
    }

    .title p{
        opacity:0.8;
    }
</style>
</head>
<body>

<div class="title">
    <h1>Öine Maantee</h1>
    <p>Autod • Tähed • Välk</p>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;

window.addEventListener("resize", () => {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    createStars();
});

//////////////////////////////////////////////////////
// STARS
//////////////////////////////////////////////////////

let stars = [];

function createStars(){

    stars = [];

    for(let i=0;i<300;i++){

        stars.push({
            x:Math.random()*w,
            y:Math.random()*h*0.7,
            r:Math.random()*2,
            a:Math.random(),
            speed:(Math.random()*0.02)+0.005
        });
    }
}

createStars();

//////////////////////////////////////////////////////
// LIGHTNING
//////////////////////////////////////////////////////

let lightning = 0;

setInterval(() => {

    if(Math.random() > 0.45){
        lightning = 1;
    }

}, 5000);

//////////////////////////////////////////////////////
// CARS
//////////////////////////////////////////////////////

let cars = [];

function createCars(){

    cars = [];

    for(let i=0;i<8;i++){

        const direction = Math.random() > 0.5 ? 1 : -1;

        cars.push({
            x: direction === 1
                ? -200 - Math.random()*800
                : w + Math.random()*800,

            y: h*0.72 + (Math.random()*90 - 45),

            speed: 4 + Math.random()*7,

            direction,

            color:[
                "#ff3030",
                "#2ea8ff",
                "#ffffff",
                "#ffd23f",
                "#57ff89"
            ][Math.floor(Math.random()*5)]
        });
    }
}

createCars();

//////////////////////////////////////////////////////
// DRAW SKY
//////////////////////////////////////////////////////

function drawSky(){

    const grad = ctx.createLinearGradient(0,0,0,h);

    grad.addColorStop(0,"#01030a");
    grad.addColorStop(0.5,"#07152b");
    grad.addColorStop(1,"#111");

    ctx.fillStyle = grad;
    ctx.fillRect(0,0,w,h);

    // stars

    stars.forEach(s => {

        s.a += s.speed;

        if(s.a > 1 || s.a < 0.2){
            s.speed *= -1;
        }

        ctx.beginPath();

        ctx.fillStyle = `rgba(255,255,255,${s.a})`;

        ctx.arc(s.x,s.y,s.r,0,Math.PI*2);

        ctx.fill();
    });
}

//////////////////////////////////////////////////////
// DRAW ROAD
//////////////////////////////////////////////////////

function drawRoad(){

    const roadY = h*0.72;

    // road glow

    ctx.fillStyle = "rgba(255,255,255,0.03)";
    ctx.fillRect(0,roadY-60,w,120);

    // road

    ctx.fillStyle = "#1c1c1c";
    ctx.fillRect(0,roadY-45,w,90);

    // road edges

    ctx.strokeStyle = "#666";
    ctx.lineWidth = 3;

    ctx.beginPath();

    ctx.moveTo(0,roadY-45);
    ctx.lineTo(w,roadY-45);

    ctx.moveTo(0,roadY+45);
    ctx.lineTo(w,roadY+45);

    ctx.stroke();

    // center dashed line

    ctx.strokeStyle = "#ffd54a";
    ctx.lineWidth = 4;
    ctx.setLineDash([30,25]);

    ctx.beginPath();
    ctx.moveTo(0,roadY);
    ctx.lineTo(w,roadY);

    ctx.stroke();

    ctx.setLineDash([]);
}

//////////////////////////////////////////////////////
// DRAW CAR
//////////////////////////////////////////////////////

function drawCar(car){

    const x = car.x;
    const y = car.y;

    ctx.save();

    ctx.translate(x,y);

    if(car.direction === -1){
        ctx.scale(-1,1);
    }

    // glow

    ctx.shadowBlur = 20;
    ctx.shadowColor = car.color;

    // body

    ctx.fillStyle = car.color;

    ctx.beginPath();
    ctx.roundRect(-30,-12,60,24,8);
    ctx.fill();

    // top

    ctx.beginPath();
    ctx.roundRect(-15,-24,30,16,6);
    ctx.fill();

    // windows

    ctx.fillStyle = "#8ee7ff";

    ctx.beginPath();
    ctx.roundRect(-10,-21,20,10,4);
    ctx.fill();

    // wheels

    ctx.shadowBlur = 0;

    ctx.fillStyle = "#111";

    ctx.beginPath();

    ctx.arc(-18,14,7,0,Math.PI*2);
    ctx.arc(18,14,7,0,Math.PI*2);

    ctx.fill();

    // headlights

    ctx.fillStyle = "#fff8b0";

    ctx.beginPath();

    ctx.arc(31,-4,4,0,Math.PI*2);
    ctx.arc(31,4,4,0,Math.PI*2);

    ctx.fill();

    // headlight beam

    const grad = ctx.createLinearGradient(30,0,130,0);

    grad.addColorStop(0,"rgba(255,255,200,0.35)");
    grad.addColorStop(1,"rgba(255,255,200,0)");

    ctx.fillStyle = grad;

    ctx.beginPath();

    ctx.moveTo(30,-12);
    ctx.lineTo(130,-30);
    ctx.lineTo(130,30);
    ctx.lineTo(30,12);

    ctx.closePath();

    ctx.fill();

    ctx.restore();

    // movement

    car.x += car.speed * car.direction;

    // reset

    if(car.direction === 1 && car.x > w + 200){
        car.x = -300;
    }

    if(car.direction === -1 && car.x < -300){
        car.x = w + 300;
    }
}

//////////////////////////////////////////////////////
// LIGHTNING
//////////////////////////////////////////////////////

function drawLightning(){

    if(lightning <= 0) return;

    ctx.fillStyle = `rgba(255,255,255,${lightning*0.18})`;
    ctx.fillRect(0,0,w,h);

    ctx.strokeStyle = `rgba(255,255,255,${lightning})`;
    ctx.lineWidth = 3;

    let x = Math.random()*w;

    ctx.beginPath();
    ctx.moveTo(x,0);

    let currentX = x;
    let currentY = 0;

    while(currentY < h*0.5){

        currentX += (Math.random()-0.5)*50;
        currentY += Math.random()*40;

        ctx.lineTo(currentX,currentY);
    }

    ctx.stroke();

    lightning -= 0.03;
}

//////////////////////////////////////////////////////
// ANIMATION
//////////////////////////////////////////////////////

function animate(){

    requestAnimationFrame(animate);

    drawSky();
    drawRoad();

    cars.forEach(drawCar);

    drawLightning();
}

animate();

</script>

</body>
</html>
