<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lightning Highway</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        overflow:hidden;
        background:
            radial-gradient(circle at top, #101a33 0%, #050814 60%, #000 100%);
        height:100vh;
        cursor:pointer;
        font-family:Arial, sans-serif;
    }

    canvas{
        position:fixed;
        inset:0;
        width:100%;
        height:100%;
    }

    .title{
        position:fixed;
        top:30px;
        left:50%;
        transform:translateX(-50%);
        color:white;
        font-size:42px;
        font-weight:bold;
        letter-spacing:3px;
        text-shadow:
            0 0 10px #7dd3ff,
            0 0 25px #00aaff;
        z-index:10;
        pointer-events:none;
    }

    .controls{
        position:fixed;
        bottom:40px;
        left:50%;
        transform:translateX(-50%);
        display:flex;
        gap:15px;
        z-index:20;
    }

    button{
        padding:14px 28px;
        border:none;
        border-radius:14px;
        background:rgba(20,40,80,0.75);
        color:white;
        font-size:16px;
        font-weight:bold;
        cursor:pointer;
        backdrop-filter:blur(10px);
        transition:0.25s;
        box-shadow:
            0 0 10px rgba(0,180,255,0.5),
            inset 0 0 10px rgba(255,255,255,0.1);
    }

    button:hover{
        transform:translateY(-3px) scale(1.05);
        background:rgba(40,80,140,0.9);
        box-shadow:
            0 0 20px rgba(0,200,255,0.9),
            0 0 40px rgba(0,120,255,0.5);
    }

    .hint{
        position:fixed;
        top:95px;
        left:50%;
        transform:translateX(-50%);
        color:#bfe8ff;
        opacity:0.85;
        font-size:16px;
        z-index:10;
        pointer-events:none;
    }
</style>
</head>
<body>

<div class="title">⚡ LIFE IS A HIGHWAY ⚡</div>
<div class="hint">Vajuta ekraanile ja kutsu välgud esile</div>

<div class="controls">
    <button id="playBtn">▶ Play Music</button>
    <button id="stormBtn">⚡ Mega Storm</button>
</div>

<canvas id="canvas"></canvas>

<!--
Pane samasse GitHub Pages kausta fail:
life-is-a-highway.mp3

Näiteks:
index.html
life-is-a-highway.mp3
-->

<audio id="music" loop>
    <source src="life-is-a-highway.mp3" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const music = document.getElementById("music");
const playBtn = document.getElementById("playBtn");
const stormBtn = document.getElementById("stormBtn");

let w, h;

function resize(){
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}
resize();

window.addEventListener("resize", resize);

const sparkles = [];
const ambientBolts = [];
const clickBolts = [];

class Sparkle{
    constructor(){
        this.reset();
    }

    reset(){
        this.x = Math.random() * w;
        this.y = Math.random() * h;
        this.radius = Math.random() * 2 + 0.5;
        this.alpha = Math.random();
        this.speed = Math.random() * 0.02 + 0.005;
    }

    update(){
        this.alpha += this.speed;

        if(this.alpha >= 1 || this.alpha <= 0){
            this.speed *= -1;
        }
    }

    draw(){
        ctx.beginPath();
        ctx.fillStyle = `rgba(120,200,255,${this.alpha})`;
        ctx.shadowBlur = 15;
        ctx.shadowColor = "#7dd3ff";
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
    }
}

class Lightning{
    constructor(x1, y1, x2, y2, strong=false){
        this.points = [];
        this.life = strong ? 25 : 12;
        this.maxLife = this.life;
        this.strong = strong;

        this.createBolt(x1, y1, x2, y2);
    }

    createBolt(x1,y1,x2,y2){
        const segments = 25;

        this.points.push({x:x1,y:y1});

        for(let i=1;i<segments;i++){

            const t = i / segments;

            const nx =
                x1 + (x2 - x1) * t +
                (Math.random() - 0.5) * 80;

            const ny =
                y1 + (y2 - y1) * t +
                (Math.random() - 0.5) * 80;

            this.points.push({x:nx,y:ny});
        }

        this.points.push({x:x2,y:y2});
    }

    update(){
        this.life--;
    }

    draw(){

        const alpha = this.life / this.maxLife;

        ctx.beginPath();
        ctx.moveTo(this.points[0].x, this.points[0].y);

        for(const p of this.points){
            ctx.lineTo(p.x,p.y);
        }

        ctx.strokeStyle = this.strong
            ? `rgba(255,255,255,${alpha})`
            : `rgba(120,200,255,${alpha})`;

        ctx.lineWidth = this.strong ? 4 : 2;

        ctx.shadowBlur = this.strong ? 35 : 15;
        ctx.shadowColor = "#8ae6ff";

        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(this.points[0].x, this.points[0].y);

        for(const p of this.points){
            ctx.lineTo(p.x,p.y);
        }

        ctx.strokeStyle = `rgba(180,240,255,${alpha})`;
        ctx.lineWidth = 1;
        ctx.stroke();
    }
}

for(let i=0;i<220;i++){
    sparkles.push(new Sparkle());
}

setInterval(()=>{

    const side = Math.random();

    let x1, y1, x2, y2;

    if(side < 0.5){
        x1 = Math.random() * w;
        y1 = 0;
        x2 = Math.random() * w;
        y2 = h;
    } else {
        x1 = 0;
        y1 = Math.random() * h;
        x2 = w;
        y2 = Math.random() * h;
    }

    ambientBolts.push(
        new Lightning(x1,y1,x2,y2,false)
    );

}, 900);

function createStrike(x,y){

    for(let i=0;i<5;i++){

        const angle = (Math.PI * 2 / 5) * i;
        const distance = 250 + Math.random()*250;

        const x2 = x + Math.cos(angle) * distance;
        const y2 = y + Math.sin(angle) * distance;

        clickBolts.push(
            new Lightning(x,y,x2,y2,true)
        );
    }

    flash();
}

window.addEventListener("click", (e)=>{
    createStrike(e.clientX, e.clientY);
});

stormBtn.addEventListener("click", ()=>{

    for(let i=0;i<10;i++){

        setTimeout(()=>{

            const x = Math.random() * w;
            const y = Math.random() * h;

            createStrike(x,y);

        }, i * 120);
    }
});

playBtn.addEventListener("click", async ()=>{

    if(music.paused){

        try{
            await music.play();
            playBtn.innerHTML = "⏸ Pause Music";
        }catch(err){
            alert("Brauser blokeeris autoplay. Vajuta uuesti.");
        }

    }else{
        music.pause();
        playBtn.innerHTML = "▶ Play Music";
    }
});

function flash(){

    const flashDiv = document.createElement("div");

    flashDiv.style.position = "fixed";
    flashDiv.style.inset = "0";
    flashDiv.style.background =
        "rgba(180,220,255,0.18)";

    flashDiv.style.pointerEvents = "none";
    flashDiv.style.zIndex = "5";
    flashDiv.style.transition = "opacity 0.3s";

    document.body.appendChild(flashDiv);

    setTimeout(()=>{
        flashDiv.style.opacity = "0";
    },40);

    setTimeout(()=>{
        flashDiv.remove();
    },300);
}

function animate(){

    requestAnimationFrame(animate);

    ctx.clearRect(0,0,w,h);

    ctx.fillStyle = "rgba(0,0,10,0.18)";
    ctx.fillRect(0,0,w,h);

    sparkles.forEach(s=>{
        s.update();
        s.draw();
    });

    for(let i=ambientBolts.length-1;i>=0;i--){

        ambientBolts[i].update();
        ambientBolts[i].draw();

        if(ambientBolts[i].life <= 0){
            ambientBolts.splice(i,1);
        }
    }

    for(let i=clickBolts.length-1;i>=0;i--){

        clickBolts[i].update();
        clickBolts[i].draw();

        if(clickBolts[i].life <= 0){
            clickBolts.splice(i,1);
        }
    }
}

animate();
</script>

</body>
</html>
